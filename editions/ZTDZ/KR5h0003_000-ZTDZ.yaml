道念枉害良善若自作若教他作若自受若他𨑰受若有善男子女人或被惡人咒詛魘禱皆當香湯林浴崇建道塲請道迎真皈命道像大慈真人孔雀明王諸真聖衆志心轉誦此孔雀明王聖母尊經此經功德不可思議此經能解鐡圍此經䏻救患病此經䏻離惡人此經䏻除一切惡魔此經䏻解咒詛惡業此經䏻碎一切邪道此經䏻禳一切水火災難此經䏻破諸大地徹此經䏻護國土一切刀兵此經䏻滅䖝蝗保護善人此經難言說不盡述此經在䖏常有五方五帝部領兵馬各百萬人守䕶此經䏻與弟子之䖏四向八方上下中央剪除不祥魘禳木恠普獲消禳即說魘蠱咒曰太法堂堂天圓地方天有九柱地有九梁魘咒之人自受其𣧎六柱三梁魘疊消亡三梁六柱還其本主六甲六乙魘蠱迷亡六丙六丁魘疊不形六戊六巳魘疊不起六庚六辛魘蠱不真六壬六癸魘疊自睡咒詛速解𡨚業逺奔敢有違令攝赴雷獄剜心取肺血割身形依吾咒詛便得長生急急如律令衆奉行三五將軍八風使者九州社令有萬將軍力士百萬千衆追取魘蠱五音使者攝追魘蠱之人三魂七魄俱入禁獄不得出離咒詛惡人精魂敗越神志猖狂頭戴火山十分燋熬萬刧受苦不捨畫夜若還依此孔雀明王經教使得解釋和散𡨚魂生天吾今所說解𡨚咒詛魘魅經法若有善男子女人得聞此經大開方便救治病難度脫衆生命得安穩身強體徤福壽延長永無災障𡨚家債主速去消除釋散疊毒驅除三屍得道成真是時太上老君即說咒曰我昔逰中國位登無上天今來入中國教化諸衆生九十有六種其中各有縁令其敬信者展轉自相傳精進心不退得生無上天有誦此经䖏斯人壽命延百神來護衛萬病悉皆痊見世得然樂身如金石堅至真無上法消災福自然若是依吾教下邪化㣲塵如是依經典𡨚家自消散奉真得長生永世得安然急急如律令法衆䖍誠志心讃念滅魔靈章咒曰随願随願樗蒙樗蒙天輪天輪法霖法霖訣岑訣岑法部多法部多修羅吉利修羅吉利轉轉吉利成成吉利昇昇吉利巴元巴元醜伯醜伯丹留丹留負天負天擔石擔石烱開烱開陀羅陀羅謨訶謨訶元素刀利王監醜豁落神列日度皇王西天刮羅神龍願竺陀王欎多羅神江音河伯王山澤洞淵神九素天魔十天皇帝太㣲五神四瀆河源明王天尊急急如律令清江引稽首大光琞尊大光明王尊消災保安寍無上尊孔雀琞經稽首太光盟尊大光明五尊消災保安寍無上尊孔雀琞經稽首大光盟尊大光明主尊消災保安寍無上尊孔卷盟經衆爾時太上老君昔自元始說經以來諸仙聖衆救度羣生便得安寍却禍儲祥祛除邪鬼解釋咒詛㐫𣧎散滅吉瑞來臻扶持聖道經教流傳是時大衆歡喜踴躣不勝欣崇随願受持稽首皈依奉辭而退太上元始天尊說寳月光皇后敫母孔雀明王尊經卷中畢三皈依皈命孔雀經護國保安寍普願諸衆生悉皈依清㣲無上尊皈命明王經照徹十方人普願有縁人悉皈依禹餘無上尊皈命聖母經龍章始結成普願諸有情悉皈依大赤無上尊人人得長壽箇箇樂昇平願滅諸煩惱消除永不生稽首皈依道同此結良因共生極樂國龍華會上人志心信禮禹餘上清宫香林苑靈寶尊說法也天花墜無上尊普度諸衆生普天下大千界𨶒浮地男女也總皈依除邪悉輔正㧞沉淪救生死妙得不思議無上尊成就一切願若皈依孔雀經真教主口業罪消除稽首皈依無極大道爲上良因志心稱念孔雀明王大天尊衆和不可思議功德
